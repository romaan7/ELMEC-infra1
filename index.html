<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ELMEC Infrastructure is a London-based firm delivering integrated civil, electrical and mechanical works — founded on two decades of experience across the UK's landmark rail and highways programmes."
    />
    <meta name="theme-color" content="#0E1B2C" />
    <title>ELMEC Infrastructure — Engineering the world's essential infrastructure</title>

    <!-- Web fonts: Archivo (display) + Inter (body). Preconnected, display=swap
         to avoid render-blocking text. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Netlify Forms registration (build-time detection for the SPA form).
         Must mirror the fields in src/components/contact/ContactForm.jsx.
         Submissions are emailed to mukhtarmohsin9@gmail.com — configure this
         in Netlify: Site settings → Forms → Form notifications. -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="enquiryType"></select>
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
